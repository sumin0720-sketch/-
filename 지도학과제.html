<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Web Map Layout with Tmap</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Header */
        .header {
            height: 60px;
            background: #004b87;
            color: white;

            display: flex;
            align-items: center;

            padding: 0 20px;

            box-sizing: border-box;
        }

        #headerTitle {
            font-size: 22px;
            font-weight: bold;
        }

        #languageSelect {
            margin-left: auto;   /* 핵심 */
            
            height: 34px;
            padding: 0 10px;

            border: none;
            border-radius: 5px;

            background: white;
            cursor: pointer;
        }

        /* Main Container */
        .container {
            display:flex;
            height:calc(100vh - 60px);
            overflow:hidden;
        }

        /* Sidebar */
        .sidebar {
            flex:0 0 30px;
            min-width: 280px;
            background: #f8f9fa;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .sidebar h3 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #004b87;
            padding-bottom: 8px;
        }

        .notice-box {
            background-color: #e8f4fd;
            border-left: 4px solid #1c7ed6;
            padding: 10px;
            font-size: 13px;
            color: #2b2b2b;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        /* Buttons */
        button {
            width: 100%;
            margin-bottom: 10px;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            background-color: #fff;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #e9ecef;
        }

        button.primary {
            background-color: #e7f5ff;
            color: #1c7ed6;
            border-color: #a5d8ff;
        }
        
        button.danger {
            background-color: #fff5f5;
            color: #e03131;
            border-color: #ffc9c9;
        }

        /* Map Area */
        #map_div {
            flex:1;
            height: calc(100vh - 60px);
            background: #d9d9d9;
            box-sizing: border-box;
        }
        
        .info-box {
            padding: 10px;
            font-size: 13px;
            line-height: 1.4;
        }

        .language-toggle{
        margin-left:auto;
        color:white;
        font-size:15px;
        font-weight:bold;
        user-select:none;
        }

        .language-toggle span{
            cursor:pointer;
            padding:0 4px;
        }

        .language-toggle span:hover{
            text-decoration:underline;
        }

        .active-lang{
            color:#ffd43b;
        }
    </style>

     // 정보창 언어를 현재 UI에 맞게 변환
    function convertLanguage(langText){

        // 한국어 모드
         if(currentLanguage === "ko"){
             return langText;
            }

        // 영어 모드
            const map = {
                "영어": "English",
                "러시아어": "Russian",
                "몽골어": "Mongolian",
                "중국어": "Chinese",
                "일어": "Japanese",
                "일본어": "Japanese",
                "아랍어": "Arabic",
                "카자흐어": "Kazakh",
                "프랑스어": "French",
                "베트남어": "Vietnamese",
                "포르투갈어": "Portuguese",
                "스페인어": "Spanish"
            };

            let result = langText;

            for(let key in map){
                result = result.replaceAll(key, map[key]);
            }

            return result;
    }

            translations[lang].findRoute;

            translations[lang].showAll;

        document.getElementById("resetBtn").innerText =
            translations[lang].reset;

        document.getElementById("mapControlTitle").innerText =
            translations[lang].mapControl;

        document.getElementById("zoomInBtn").innerText =
            translations[lang].zoomIn;

        document.getElementById("zoomOutBtn").innerText =
            translations[lang].zoomOut;

        document.getElementById("darkModeBtn").innerText =
            translations[lang].darkMode;

        if(lang === "en"){

            document.getElementById("langEN")
                .classList.add("active-lang");

            document.getElementById("langKO")
                .classList.remove("active-lang");

        }else{

            document.getElementById("langKO")
                .classList.add("active-lang");

            document.getElementById("langEN")
                .classList.remove("active-lang");

        }
    }

        // 정보창 x창
        function closeInfoWindow(){

            if(currentInfoWindow){

                currentInfoWindow.setMap(null);

                currentInfoWindow = null;
            }
        }

        // 사용자의 좌표 초기값 null 설정
        var userPosition = { lat: null, lng: null };

    function initTmap(){

        map = new Tmapv3.Map("map_div", {
            center : new Tmapv3.LatLng(37.550000, 126.990000),
            width : "100%",
            height : "100%",
            zoom : 12
        });

        createHospitalMarkers();

            // 우클릭 메뉴 제거
            document.getElementById("map_div").addEventListener("contextmenu", function(e){
                e.preventDefault();
            });

            // 우클릭으로 출발지 지정
            document.getElementById("map_div").addEventListener("mousedown", function(e){

                if(e.button !== 2){
                    return;
                }

                e.preventDefault();

                const mapRect =
                    document.getElementById("map_div")
                    .getBoundingClientRect();

                const x = e.clientX - mapRect.left;
                const y = e.clientY - mapRect.top;

                try {

                    const coord = map.screenToReal(
                        new Tmapv3.Point(x, y)
                    );

                    const lat = coord._lat;
                    const lng = coord._lng;

                    userPosition.lat = lat;
                    userPosition.lng = lng;

                    // 기존 출발지 마커 제거
                    if(userMarker){
                        userMarker.setMap(null);
                    }

                    // 새 출발지 마커 생성
                    userMarker = new Tmapv3.Marker({
                        position : new Tmapv3.LatLng(lat, lng),
                        map : map,
                        title : "출발지"
                    });

                    clearRouteLines();

                    if(currentInfoWindow){
                        currentInfoWindow.setMap(null);
                        currentInfoWindow = null;
                    }

                    console.log("출발지 지정 완료");

                } catch(err){

                    console.error(err);

                }

            });

        }

        function createHospitalMarkers() {
            hospitalData.forEach(function(item) {
                var marker = new Tmapv3.Marker({
                position: new Tmapv3.LatLng(item.lat, item.lng),
                title: item.name,
                map: map,

                icon: "hospital.png",

                iconSize: new Tmapv3.Size(
                    30, 30
                )
                });

                marker.on("click", function() {

                    if(currentInfoWindow){
                        currentInfoWindow.setMap(null);
                    }

                    const content = `
                        <div class="info-box">

                            <div style="
                                display:flex;
                                justify-content:space-between;
                                align-items:center;
                            ">

                                <strong style="
                                    color:#004b87;
                                    font-size:14px;
                                ">
                                    ${item.name}
                                </strong>

                                <span
                                    onclick="closeInfoWindow()"
                                    style="
                                        cursor:pointer;
                                        font-weight:bold;
                                        font-size:16px;
                                        color:#666;
                                    ">
                                    ✕
                                </span>

                            </div>

                            <span style="font-size:11px; color:#666;">
                                ${
                                    currentLanguage === "en"
                                    ? "Closest International Healthcare Center"
                                    : "가장 가까운 국제진료센터"
                                }
                            </span>

                            <hr style="margin:5px 0;
                                    border:0;
                                    border-top:1px solid #eee;">

                            🗣️ <b>
                                ${translations[currentLanguage].infoSupport}
                            </b><br>

                            ${convertLanguage(item.lang)}

                            ${marker.isNearest ? `

                            <hr style="margin:5px 0;
                            border:0;
                            border-top:1px solid #eee;">

                            📍 <b>
                                ${currentLanguage === "en"
                                    ? "Distance"
                                    : "거리"}
                            </b><br>

                            ${(routeDistance / 1000).toFixed(2)} km

                            <br><br>

                            🚗 <b>
                            ${currentLanguage === "en"
                                ? "Driving Time"
                                : "차량 이동 시간"}
                            </b><br>

                            ${Math.ceil(carTime / 60)}
                            ${currentLanguage === "en"
                                ? " min"
                                : "분"}

                            <br><br>
                            🚶 <b>
                                ${currentLanguage === "en"
                                    ? "Walking Time"
                                    : "도보 시간"}
                            </b><br>

                            ${Math.ceil(routeTime / 60)}
                            ${currentLanguage === "en"
                                ? " min"
                                : "분"}

                            <br><br>

                            ` : ""}

                            <a href="${item.url}"
                            target="_blank"
                            style="
                                    color:#1a73e8;
                                    font-weight:bold;
                                    text-decoration:none;">

                                ${translations[currentLanguage].infoWebsite}

                            </a>

                        </div>
                    `;

                    var infoWindow = new Tmapv3.InfoWindow({
                        position: new Tmapv3.LatLng(
                            item.lat,
                            item.lng
                        ),
                        content: content,
                        type: 2,
                        map: map
                    });

                    currentInfoWindow = infoWindow;
                });

                marker.customData = item;
                marker.isNearest = false;
                // 처음에는 지도에서 숨김
                marker.setMap(null);
                hospitalMarkers.push(marker);
            });
        }

        function getDistance(lat1, lng1, lat2, lng2) {
            var R = 6371; 
            var dLat = (lat2 - lat1) * Math.PI / 180;
            var dLng = (lng2 - lng1) * Math.PI / 180;
            var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLng/2) * Math.sin(dLng/2);
            var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        }

        function showNearestHospitalRoute() {
            if (userPosition.lat === null || userPosition.lng === null) {
                alert("먼저 오른쪽 지도 영역을 마우스로 클릭하여 출발지를 지정해 주세요!");
                return;
            }

            clearRouteLines();
            if (currentInfoWindow) currentInfoWindow.setMap(null);
            hospitalMarkers.forEach(function(m) { m.setMap(null); });

            var minDistance = Infinity;
            var nearestMarker = null;

            hospitalMarkers.forEach(function(marker) {
                var dist = getDistance(
                    userPosition.lat, userPosition.lng,
                    marker.getPosition().lat(), marker.getPosition().lng()
                );
                if (dist < minDistance) {
                    minDistance = dist;
                    nearestMarker = marker;
                }
            });

            if (nearestMarker) {
                nearestMarker.isNearest = true;
                nearestMarker.setMap(map);

                var startX = userPosition.lng;
                var startY = userPosition.lat;
                var endX = nearestMarker.getPosition().lng();
                var endY = nearestMarker.getPosition().lat();

                var apiUrl = "https://apis.openapi.sk.com/tmap/routes/pedestrian?version=1&format=json";
                var headers = {
                    "appKey": tmapAppKey,
                    "Content-Type": "application/json"
                };
                var bodyData = JSON.stringify({
                    "startX": startX.toString(),
                    "startY": startY.toString(),
                    "endX": endX.toString(),
                    "endY": endY.toString(),
                    "startName": "출발지",
                    "endName": nearestMarker.customData.name
                });

                fetch(apiUrl, {
                    method: "POST",
                    headers: headers,
                    body: bodyData
                })
                .then(response => response.json())
                .then(data => {
                    // 🌟 [에러창 문제 해결] 데이터 바인딩 오류 예외 조건문 리팩토링
                    if(!data.features || data.features.length === 0) {
                        alert("경로 데이터를 가져오지 못했습니다. API 키 권한을 확인하세요.");
                        return;
                    }
                    
                    routeDistance =
                    data.features[0].properties.totalDistance;

                    routeTime =
                        data.features[0].properties.totalTime;

                    /* 차량 시간 조회 */
                    fetch(
                        "https://apis.openapi.sk.com/tmap/routes?version=1&format=json",
                        {
                            method: "POST",
                            headers: {
                                "appKey": tmapAppKey,
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({
                                startX: startX.toString(),
                                startY: startY.toString(),
                                endX: endX.toString(),
                                endY: endY.toString(),
                                reqCoordType: "WGS84GEO",
                                resCoordType: "WGS84GEO",
                                searchOption: "0"
                            })
                        }
                    )
                    .then(res => res.json())
                    .then(carData => {

                        carTime =
                            carData.features[0].properties.totalTime;

                        drawRealRoute(data.features);

                        map.setCenter(nearestMarker.getPosition());
                        map.setZoom(13);

                        nearestMarker.trigger("click");

                    })
                    .catch(err => {

                        console.error("차량 경로 조회 실패", err);

                        drawRealRoute(data.features);

                        map.setCenter(nearestMarker.getPosition());
                        map.setZoom(13);

                        nearestMarker.trigger("click");

                    });
                })
                .catch(error => {
                    console.error("Error:", error);
                });
            }
        }

        function drawRealRoute(features) {
            features.forEach(function(feature) {
                if (feature.geometry.type === "LineString") {
                    var pathCoords = [];
                    feature.geometry.coordinates.forEach(function(coord) {
                        pathCoords.push(new Tmapv3.LatLng(coord[1], coord[0]));
                    });

                    var polyline = new Tmapv3.Polyline({
                        path: pathCoords,
                        strokeColor: "#002b87", 
                        strokeOpacity: 0.9,
                        strokeWeight: 6,
                        map: map
                    });
                    routePolylines.push(polyline);
                }
                // 'Point' 데이터가 통과할 때 뜨던 예외 catch/alert 블록을 완전히 삭제했습니다.
            });
        }

        function showAllHospitals() {
            clearMapData();
            hospitalMarkers.forEach(function(marker) {
                marker.isNearest = false;
                marker.setMap(map);
            });
            map.setCenter(new Tmapv3.LatLng(37.550000, 126.990000));
            map.setZoom(12);
        }

        function clearRouteLines() {
            routePolylines.forEach(function(line) { line.setMap(null); });
            routePolylines = [];
        }

        function clearMapData() {
            if (currentInfoWindow) { currentInfoWindow.setMap(null); currentInfoWindow = null; }
            clearRouteLines();
            hospitalMarkers.forEach(function(marker) { marker.setMap(null); });
            if (userMarker) { userMarker.setMap(null); userMarker = null; }
            userPosition = { lat: null, lng: null };
        }
    </script>
</head>
<body onload="initTmap(); changeLanguage('en');">

    <div class="header">
            <div id="headerTitle">
        Closest International Healthcare Center Navigation
            </div>

            <div class="language-toggle">

                <span onclick="changeLanguage('en')"
                    id="langEN"
                    class="active-lang">
                    EN
                </span>

                <span>|</span>

                <span onclick="changeLanguage('ko')"
                    id="langKO">
                    KO
                </span>

            </div>

        </div>

    <div class="container">

        <div class="sidebar">
            
            <h3 id="guideTitle">대피 경로 안내</h3>
            <div class="notice-box" id="noticeBox">
                📍 사용 방법:<br>
                1. 처음 진입 시 내 위치 마커가 없습니다.<br>
                2. 지도에서 우클릭하여 출발지를 지정하세요.<br>
                3. 아래 버튼을 눌러 가장 가까운 병원을 찾으세요.
            </div>

            <button id="findRouteBtn" class="primary" onclick="showNearestHospitalRoute()">🚨 실제 도로 기준 최단 병원 찾기</button>
            <button id="showAllBtn" onclick="showAllHospitals()">📋 전체 지정병원 보기</button>
            <button id="resetBtn" class="danger" onclick="clearMapData()">🔄 지도 및 위치 전체 초기화</button>
            
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ccc;">
            
            <h3 id="mapControlTitle">지도 제어</h3>
            <button id="zoomInBtn" onclick="zoomIn()">지도 확대</button>
            <button id="zoomOutBtn" onclick="zoomOut()">지도 축소</button>
            <button id="darkModeBtn" onclick="toggleDark()">야간 모드 (필터)</button>
        </div>

        <div id="map_div"></div>

    </div>

    <script>
        const mapElement = document.getElementById('map_div');
        function zoomIn() { if(map) map.setZoom(map.getZoom() + 1); }
        function zoomOut() { if(map) map.setZoom(map.getZoom() - 1); }
        function toggleDark() {
            if (mapElement.style.filter === 'brightness(0.5)') {
                mapElement.style.filter = 'none';
            } else {
                mapElement.style.filter = 'brightness(0.5)';
            }
        }
    </script>
</body>
</html>
